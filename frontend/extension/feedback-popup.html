<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 350px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 0;
    }
    .header {
      background: #FF9800;
      color: white;
      padding: 12px 16px;
    }
    .header h2 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    .content {
      padding: 16px;
    }
    .prediction-info {
      background: white;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #e0e0e0;
    }
    .threat-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-right: 8px;
    }
    .badge-safe { background: #4CAF5030; color: #4CAF50; }
    .badge-suspicious { background: #FF980030; color: #FF9800; }
    .badge-critical { background: #F4433630; color: #F44336; }
    .score-bar {
      width: 100%;
      height: 20px;
      background: #e0e0e0;
      border-radius: 10px;
      margin: 8px 0;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #FF9800, #F44336);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: bold;
    }
    .feedback-section {
      background: white;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .feedback-title {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 12px;
      color: #333;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .button {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .button:hover {
      border-color: #1976d2;
      color: #1976d2;
    }
    .button.active {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }
    .button.correct { border-color: #4CAF50; }
    .button.correct:hover { color: #4CAF50; border-color: #4CAF50; }
    .button.correct.active { background: #4CAF50; border-color: #4CAF50; }
    .button.incorrect { border-color: #F44336; }
    .button.incorrect:hover { color: #F44336; border-color: #F44336; }
    .button.incorrect.active { background: #F44336; border-color: #F44336; color: white; }
    .comments-section {
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
    }
    textarea:focus {
      outline: none;
      border-color: #1976d2;
      box-shadow: 0 0 4px rgba(25, 118, 210, 0.2);
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn-submit {
      flex: 1;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }
    .btn-submit:hover {
      background: #45a049;
    }
    .btn-cancel {
      flex: 1;
      padding: 10px;
      background: #757575;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }
    .btn-cancel:hover {
      background: #616161;
    }
    .status-message {
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
    }
    .status-success {
      background: #4CAF5030;
      color: #4CAF50;
    }
    .status-error {
      background: #F4433630;
      color: #F44336;
    }
    .status-loading {
      background: #1976d230;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Was this correct?</h2>
    <p>Help improve VulNweb by providing feedback</p>
  </div>

  <div class="content">
    <!-- Prediction Info -->
    <div class="prediction-info">
      <div style="margin-bottom: 8px;">
        <span class="threat-badge" id="threat-badge">SAFE</span>
        <span style="font-size: 12px; color: #666;">Threat Score</span>
      </div>
      <div class="score-bar">
        <div class="score-fill" id="score-fill" style="width: 20%;">20%</div>
      </div>
      <div style="font-size: 11px; color: #999; margin-top: 6px;">
        Confidence: <span id="confidence">0%</span>
      </div>
    </div>

    <!-- Status Message -->
    <div id="status-message" class="status-message" style="display: none;"></div>

    <!-- Feedback Form -->
    <div class="feedback-section">
      <div class="feedback-title">Your Feedback</div>

      <div class="button-group">
        <button class="button correct" id="btn-correct" data-feedback="true">✓ Correct</button>
        <button class="button incorrect" id="btn-incorrect" data-feedback="false">✗ Incorrect</button>
      </div>

      <div class="comments-section">
        <textarea id="comments-input" placeholder="Tell us why (optional)..."></textarea>
      </div>

      <div class="actions">
        <button class="btn-submit" id="btn-submit" disabled>Send Feedback</button>
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>

    <!-- Help Text -->
    <div style="font-size: 11px; color: #999; padding: 12px; background: #f5f5f5; border-radius: 4px;">
      <strong>Why feedback matters:</strong> Your corrections help train better models. Each piece of feedback makes VulNweb smarter and more accurate.
    </div>
  </div>

  <script src="feedback-popup.js"></script>
</body>
</html>
