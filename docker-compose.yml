version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vulnweb_db
    environment:
      POSTGRES_USER: vulnweb
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: vulnweb_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: vulnweb_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vulnweb:password123@db:5432/vulnweb_db
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      UNSW_DATASET_DIR: /app/data/unsw
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./ml_model:/app/ml_model
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: